version: '3.8'

services:
  password-validator:
    build:
      context: ./password-validator
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081

  password-gateway:
    build:
      context: ./password-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - VALIDATOR_URL=http://password-validator:8081/api/v1/password/evaluate
    depends_on:
      - password-validator
